name: frontend

on:
  push:
    branches:
      - main

jobs:
  myprojectDeploy:
    runs-on: ubuntu-latest

    steps:
      # Dependencies install
      - name: git library
        uses: actions/checkout@v4

      - name: ssh connection
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.IP }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd /home/umang30/6weeks_umang_MEAN
            git pull origin main
            sudo npm i
            sudo npm run build
            pm2 delete "6weeks_umang_MEAN" 
            sudo npm i http-server -g
            pm2 start http-server --name "6weeks_umang_MEAN" -- dist/front-end -p 4200 || pm2 restart "6weeks_umang_MEAN"
